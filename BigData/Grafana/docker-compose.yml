version: '3.8'

services:
  # Prometheus - Sistema de métricas
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - grafana-net

  # Grafana - Dashboard de visualización
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - grafana-storage:/var/lib/grafana
    networks:
      - grafana-net
    depends_on:
      - prometheus

  # Servicio simulado que genera métricas fake
  metrics-simulator:
    image: python:3.9-slim
    container_name: metrics-simulator
    ports:
      - "8000:8000"
    volumes:
      - ./simulator:/app
    working_dir: /app
    command: >
      sh -c "pip install prometheus_client requests && python metrics_simulator.py"
    networks:
      - grafana-net
    restart: unless-stopped

volumes:
  grafana-storage:

networks:
  grafana-net:
    driver: bridge